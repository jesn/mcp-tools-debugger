            ls -lh desktop-artifacts

        - name: upload desktop artifacts
          image: cnbcool/attachments:latest
          settings:
            attachments:
              - desktop-artifacts/*

    # macOS DMG 需要真实 macOS runner；CNB 公共 push 构建实际运行在 Linux 容器中。
    # 在可用 macOS runner 接入前，普通 push 验证矩阵暂不构建 macOS DMG。

  # Tag 推送：构建桌面端 + 创建 CNB Release 并上传制品
  # 策略：linux x64 创建 Release，其他 job 成功后通过 CNB API 追加制品
  tag_push:
    - name: desktop linux x64
      runner:
        tags: cnb:arch:amd64
        cpus: 8
      docker:
        image: node:22-bookworm
        volumes:
          - /root/.npm:copy-on-write
          - /root/.cache/electron:copy-on-write
          - /root/.cache/electron-builder:copy-on-write
      env:
        ELECTRON_CACHE: /root/.cache/electron
        ELECTRON_BUILDER_CACHE: /root/.cache/electron-builder
        ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
        ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/
      stages:
        - name: install system deps
          script: apt-get update && apt-get install -y --no-install-recommends libfuse2

        - name: install dependencies
          script: npm ci

        - name: build desktop runtime
          script: npm run desktop:build

        - name: package linux x64 desktop
          script: cd desktop && npx electron-builder --linux AppImage --x64 --publish never

        - name: collect desktop artifacts
          script: |
            mkdir -p desktop-artifacts
            cp desktop/dist/*.AppImage desktop-artifacts/
            cp desktop/dist/*.blockmap desktop-artifacts/ 2>/dev/null || true
            cp desktop/dist/latest-linux.yml desktop-artifacts/ 2>/dev/null || true
            ls -lh desktop-artifacts

        - name: create release
          type: git:release
          options:
            title: ${CNB_TAG}
            description: |
              Desktop builds for ${CNB_TAG}

              ### Linux x64
              - AppImage: `MCP Tools Debugger-${CNB_TAG#v}-x86_64.AppImage`

              ### Linux arm64
              - ⏳ Building...

              ### Windows x64
              - ⏳ Building...

              ### Windows arm64
              - ⏳ Building...

              ### macOS x64
              - ⏳ Building...

              ### macOS arm64
              - ⏳ Building...

        - name: upload release asset via api
          script: |
            RELEASE_ID=$(curl -sS \
              -H "Accept: application/vnd.cnb.api+json" \
              -H "Authorization: Bearer ${CNB_TOKEN}" \
              "${CNB_API_ENDPOINT}/rich/public/mcp-tools-debugger/-/releases/tags/${CNB_TAG}" | sed 's/.*"id":"\([^"]*\)".*/\1/')
            for f in desktop-artifacts/*.AppImage; do
              [ -f "$f" ] || continue
              fname=$(basename "$f")
              fsize=$(stat -c%s "$f")
              upload_info=$(curl -sS -X POST \
                -H "Accept: application/vnd.cnb.api+json" \
                -H "Authorization: Bearer ${CNB_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "{\"asset_name\":\"${fname}\",\"size\":${fsize}}" \
                "${CNB_API_ENDPOINT}/rich/public/mcp-tools-debugger/-/releases/${RELEASE_ID}/asset-upload-url")
              upload_url=$(echo "$upload_info" | sed 's/.*"upload_url":"\([^"]*\)".*/\1/')
              curl -sS -X PUT -T "$f" "$upload_url"
              echo "Uploaded: $fname"
            done

    - name: desktop linux arm64
      runner:
        tags: cnb:arch:arm64:v8
        cpus: 8
      docker:
        image: node:22-bookworm
        volumes:
          - /root/.npm:copy-on-write
          - /root/.cache/electron:copy-on-write
          - /root/.cache/electron-builder:copy-on-write
      env:
