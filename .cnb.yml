    - name: desktop macos x64
      runner:
        tags: cnb:arch:amd64
        cpus: 8
        os: macos
      docker:
        image: node:22-bookworm
        volumes:
          - /root/.npm:copy-on-write
          - /root/.cache/electron:copy-on-write
          - /root/.cache/electron-builder:copy-on-write
      env:
        ELECTRON_CACHE: /root/.cache/electron
        ELECTRON_BUILDER_CACHE: /root/.cache/electron-builder
        ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
        ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/
      stages:
        - name: install dependencies
          script: |
            npm ci
            # dmg-license has os:darwin restriction, fetch manually for Linux DMG builds
            DG_VER="1.0.11"
            curl -sSL "https://registry.npmjs.org/dmg-license/-/dmg-license-${DG_VER}.tgz" -o /tmp/dmg-license.tgz
            mkdir -p node_modules/dmg-license
            tar --strip-components=1 -xzf /tmp/dmg-license.tgz -C node_modules/dmg-license
            rm -f /tmp/dmg-license.tgz

        - name: build desktop runtime
          script: npm run desktop:build

        - name: package macos x64 desktop
