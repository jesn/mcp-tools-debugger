# 普通推送（非 tag）：Docker 镜像 + 桌面端构建 + 附件上传
main:
  push:
    - imports: https://cnb.cool/rich/tool-group/cnb-secret/-/blob/main/github/secret.yml
      services:
        - docker
      stages:
        - name: sync to github
          image: tencentcom/git-sync
          settings:
            target_url: https://github.com/Jesn/mcp-tools-debugger.git
            auth_type: https
            username: ${GIT_USERNAME}
            password: ${GIT_ACCESS_TOKEN}
            git_email: ${GIT_EMAIL}
            git_user: ${GIT_USER}

    - services:
        - name: docker
          options:
            rootlessBuildkitd:
              enabled: true
      stages:
        - name: set docker tag
          script: echo -n "${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}"
          exports:
            info: IMAGE_REPO

        - name: docker login
          script: docker login -u ${CNB_TOKEN_USER_NAME} -p "${CNB_TOKEN}" ${CNB_DOCKER_REGISTRY}

        - name: docker build and push
          script: |
            docker buildx build \
              -t $IMAGE_REPO:${CNB_COMMIT_SHORT} \
              -t $IMAGE_REPO:latest \
              --platform linux/amd64,linux/arm64 \
              --cache-to type=registry,ref=$IMAGE_REPO:buildcache,mode=max \
              --cache-from type=registry,ref=$IMAGE_REPO:buildcache \
              --push .

    - name: desktop linux x64
      allowFailure: true
      runner:
        tags: cnb:arch:amd64
        cpus: 8
      docker:
        image: node:22-bookworm
        volumes:
          - /root/.npm:copy-on-write
          - /root/.cache/electron:copy-on-write
          - /root/.cache/electron-builder:copy-on-write
      env:
        ELECTRON_CACHE: /root/.cache/electron
        ELECTRON_BUILDER_CACHE: /root/.cache/electron-builder
        ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
        ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/
      stages:
        - name: install system deps
          script: apt-get update && apt-get install -y --no-install-recommends libfuse2

        - name: install dependencies
          script: npm ci

        - name: build desktop runtime
          script: npm run desktop:build

        - name: package linux x64 desktop
          script: cd desktop && npx electron-builder --linux AppImage --x64 --publish never

        - name: collect desktop artifacts
          script: |
            mkdir -p desktop-artifacts
            cp desktop/dist/*.AppImage desktop-artifacts/
            cp desktop/dist/*.blockmap desktop-artifacts/ 2>/dev/null || true
            cp desktop/dist/latest-linux.yml desktop-artifacts/ 2>/dev/null || true
            ls -lh desktop-artifacts

        - name: upload desktop artifacts
          image: cnbcool/attachments:latest
          settings:
            attachments:
              - desktop-artifacts/*

    - name: desktop linux arm64
      allowFailure: true
      runner:
        tags: cnb:arch:arm64:v8
        cpus: 8
      docker:
        image: node:22-bookworm
        volumes:
          - /root/.npm:copy-on-write
          - /root/.cache/electron:copy-on-write
          - /root/.cache/electron-builder:copy-on-write
      env:
        ELECTRON_CACHE: /root/.cache/electron
        ELECTRON_BUILDER_CACHE: /root/.cache/electron-builder
        ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
        ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/
      stages:
        - name: install system deps
          script: apt-get update && apt-get install -y --no-install-recommends libfuse2

        - name: install dependencies
          script: npm ci

        - name: build desktop runtime
          script: npm run desktop:build

        - name: package linux arm64 desktop
          script: cd desktop && npx electron-builder --linux AppImage --arm64 --publish never

        - name: collect desktop artifacts
          script: |
            mkdir -p desktop-artifacts
            cp desktop/dist/*arm64*.AppImage desktop-artifacts/ 2>/dev/null || true
            cp desktop/dist/*.AppImage desktop-artifacts/
            cp desktop/dist/*.blockmap desktop-artifacts/ 2>/dev/null || true
            cp desktop/dist/latest-linux-arm64.yml desktop-artifacts/ 2>/dev/null || true
            ls -lh desktop-artifacts

        - name: upload desktop artifacts
          image: cnbcool/attachments:latest
          settings:
            attachments:
              - desktop-artifacts/*

    - name: desktop windows x64
      allowFailure: true
      runner:
        tags: cnb:arch:amd64
        cpus: 8
      docker:
        image: node:22-bookworm
        volumes:
          - /root/.npm:copy-on-write
          - /root/.cache/electron:copy-on-write
          - /root/.cache/electron-builder:copy-on-write
      env:
        ELECTRON_CACHE: /root/.cache/electron
        ELECTRON_BUILDER_CACHE: /root/.cache/electron-builder
        ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/
      stages:
        - name: install system deps
          script: |
            dpkg --add-architecture i386
            apt-get update
            apt-get install -y --no-install-recommends wine wine32 wine64

        - name: install dependencies
          script: npm ci

        - name: build desktop runtime
          script: npm run desktop:build

        - name: package windows x64 desktop
