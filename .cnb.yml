              - desktop-artifacts/*

        - name: publish release
          type: git:release
          options:
            title: ${CNB_TAG}
            description: |
              Desktop builds for ${CNB_TAG}

              ### Linux x64
              - AppImage: `MCP Tools Debugger-${CNB_TAG#v}-x86_64.AppImage`

