            for f in desktop-artifacts/*arm64*.AppImage desktop-artifacts/latest-linux-arm64.yml; do
              [ -f "$f" ] || continue
              fname=$(basename "$f")
              fsize=$(stat -c%s "$f")
              upload_info=$(curl -sS -X POST \
                -H "Accept: application/vnd.cnb.api+json" \
                -H "Authorization: Bearer ${CNB_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "{\"asset_name\":\"${fname}\",\"size\":${fsize}}" \
